server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: ai-ticket-assistant
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/ai_ticket_assistant?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${SPRING_DATASOURCE_USERNAME:app}
    password: ${SPRING_DATASOURCE_PASSWORD:app}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  swagger-ui:
    path: /swagger-ui.html

assistant:
  ai:
    provider: ${AI_PROVIDER:fallback}
    anthropic-api-key: ${ANTHROPIC_API_KEY:}
    qwen-api-key: ${QWEN_API_KEY:}
    model: ${ANTHROPIC_MODEL:claude-opus-4-7}
    qwen-model: ${QWEN_MODEL:qwen-plus}
    max-tokens: ${ANTHROPIC_MAX_TOKENS:16000}
    timeout: ${ANTHROPIC_TIMEOUT:PT30S}
    enable-real-client: ${ANTHROPIC_ENABLE_REAL_CLIENT:false}
  chroma:
    base-url: ${CHROMA_BASE_URL:http://localhost:8000}
    collection: ${CHROMA_COLLECTION:ai_ticket_knowledge}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
